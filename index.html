<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connect Four AI – Alpha-Beta Minimax</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ══════════ LEFT PANEL ══════════ -->
<div id="left-panel">
  <header>
    <h1>Connect <span>Four</span> AI</h1>
    <p>Alpha-Beta Minimax  ·  Depth-adjustable search</p>
  </header>
  <div id="status-bar" class="human">
    <div class="dot" style="background:var(--human)"></div>
    <span id="status-text">Your Turn</span>
  </div>
  <div id="board-wrap"><div id="board"></div></div>
  <div id="controls">
    <div class="col-btns" id="col-btns"></div>
    <div class="ctrl-row">
      <button class="primary" id="btnNew">↺ New Game</button>
      <select id="difficulty">
        <option value="2">Easy — depth 2</option>
        <option value="4" selected>Medium — depth 4</option>
        <option value="6">Hard — depth 6</option>
      </select>
    </div>
  </div>
</div>

<!-- ══════════ RIGHT PANEL ══════════ -->
<div id="right-panel">
  <div id="right-header">
    <h2>⬡ AI Visualizer</h2>
    <button id="btnViz">Hide</button>
  </div>
  <div id="visualizer">

    <!-- 1. Column Scores -->
    <div class="viz-card">
      <div class="viz-card-title">Column Evaluation Scores</div>
      <div id="bar-chart"></div>
    </div>

    <!-- 2. Minimax Tree -->
    <div class="viz-card">
      <div class="viz-card-title">Minimax Search Tree — 2 Levels (α-β Pruning Shown)</div>
      <div id="tree-container"><svg id="tree-svg"></svg></div>
    </div>

    <!-- 3. Stats -->
    <div class="viz-card">
      <div class="viz-card-title">Search Statistics</div>
      <div id="stats-grid">
        <div class="stat-card"><div class="stat-label">Nodes Evaluated</div><div class="stat-value" id="s-nodes">—</div></div>
        <div class="stat-card"><div class="stat-label">Branches Pruned</div><div class="stat-value" id="s-pruned">—</div></div>
        <div class="stat-card"><div class="stat-label">Best Column</div><div class="stat-value" id="s-col">—</div></div>
        <div class="stat-card"><div class="stat-label">Best Score</div><div class="stat-value" id="s-score">—</div></div>
        <div id="stats-tip">—</div>
      </div>
    </div>

  </div><!-- #visualizer -->
</div><!-- #right-panel -->

<!-- Win overlay -->
<div id="banner">
  <div id="banner-title">—</div>
  <div id="banner-sub">—</div>
  <button id="banner-btn">Play Again</button>
</div>

<script src="game.js"></script>
</body>
</html>
